<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CS2 Premier Lobby Maker</title>
<style>
  :root {
    --bg: #15171c;
    --panel: #1d2026;
    --panel-2: #262a32;
    --border: #2f343d;
    --text: #e6e8ed;
    --muted: #8a92a3;
    --accent: #f5a623;
    --good: #4caf50;
    --bad: #e25555;
    --warn: #e6a23c;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 24px;
  }
  .title-group { display: flexbox; flex-direction: column; justify-items: center; }
  h1 { margin: 0 0 4px 0; font-size: 20px; }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 20px; }
  .layout { display: grid; grid-template-columns: 0.25fr 0.75fr 1fr 0.75fr 0.25fr; gap: 24px; }
  @media (max-width: 1100px) { .layout { grid-template-columns: 200px 1fr; } .panel.lobbies-panel { grid-column: 1 / -1; } }
  @media (max-width: 700px) { .layout { grid-template-columns: 1fr; } .panel.lobbies-panel { grid-column: auto; } }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }
  .panel h2 { margin: 0 0 12px 0; font-size: 15px; font-weight: 600; }

  table { width: 100%; border-collapse: collapse; }
  th, td { padding: 6px 8px; text-align: left; font-size: 14px; }
  th { color: var(--muted); font-weight: 500; border-bottom: 1px solid var(--border); }
  tbody tr { border-bottom: 1px solid var(--border); }
  tbody tr:last-child { border-bottom: none; }
  input[type="text"], input[type="number"] {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 8px;
    width: 100%;
    font-size: 14px;
  }
  input:focus { outline: none; border-color: var(--accent); }
  .name-input { min-width: 120px; }
  .rank-input { width: 90px; }

  button {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 7px 12px;
    cursor: pointer;
    font-size: 13px;
  }
  button:hover { border-color: var(--accent); }
  button.primary { background: var(--accent); color: #1a1a1a; border-color: var(--accent); font-weight: 600; }
  button.icon { padding: 4px 8px; }
  button.danger:hover { border-color: var(--bad); color: var(--bad); }

  .toolbar { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; align-items: center; }
  .config-row { display: flex; gap: 12px; align-items: center; margin-bottom: 12px; font-size: 13px; color: var(--muted); }
  .config-row input { width: 110px; }

  .lobby { background: var(--panel-2); border-radius: 6px; padding: 12px; margin-bottom: 12px; border-left: 4px solid var(--border); }
  .lobby.stack5 { border-left-color: var(--accent); }
  .lobby.ok { border-left-color: var(--good); }
  .lobby.bad { border-left-color: var(--bad); }
  .lobby-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .lobby-title { font-weight: 600; font-size: 14px; }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: var(--border); color: var(--muted); }
  .badge.stack5 { background: var(--accent); color: #1a1a1a; }
  .badge.ok { background: rgba(76,175,80,.2); color: var(--good); }
  .badge.bad { background: rgba(226,85,85,.2); color: var(--bad); }
  .player-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 13px; }
  .player-row .rank { color: var(--muted); font-variant-numeric: tabular-nums; }
  .lobby-stats { font-size: 12px; color: var(--muted); margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--border); }
  .empty { color: var(--muted); font-size: 13px; padding: 20px; text-align: center; }
  .warn-msg { color: var(--warn); font-size: 13px; margin-bottom: 8px; padding: 8px; background: rgba(230,162,60,.1); border-radius: 4px; }

  /* Rank badges - CS2 style parallelogram, tiered by color */
  .rank-badge {
    display: inline-block;
    padding: 2px 7px 2px 12px;
    font-weight: 700;
    font-size: 10px;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.3px;
    transform: skewX(-14deg);
    border: 1px solid currentColor;
    border-left-width: 5px;
    background-color: rgb(from currentColor calc(r * 0.35) calc(g * 0.35) calc(b * 0.35) / 0.3);
    line-height: 1.3;
  }

  .rank-badge::before {
    content: '';
    position: absolute;
    /* display: inline-block; */
    padding: 2px 0px 2px 0px;
    border: 1px solid currentColor;
    border-left-width: 4px;
    height: calc(10px * 1.3);
    top: -1px;
    left: 1px;
  }

  .rank-badge > span {
    display: inline-block;
    transform: skewX(14deg);
    min-width: 5.5ch;   /* fits "XX,XXX" so 4- and 5-digit ranks share width */
    text-align: center;
  }
  /* Fallback for browsers without rgb(from ...) support */
  @supports not (background-color: rgb(from red r g b / 0.3)) {
    .rank-badge { background-color: rgba(255,255,255,0.15); }
  }
  .rank-t1 { color: #c8cdd6; } /*  1000-4999  silver-gray */
  .rank-t2 { color: #6fc2ff; } /*  5000-9999  light blue */
  .rank-t3 { color: #4c6aff; } /* 10000-14999 royal blue */
  .rank-t4 { color: #8847ff; } /* 15000-19999 purple */
  .rank-t5 { color: #d32ce6; } /* 20000-24999 strong pink */
  .rank-t6 { color: #eb4b4b; } /* 25000-29999 red */
  .rank-t7 { color: #ffcf3a; } /* 30000+      gold-yellow */

  .player-row .rank-badge { font-size: 10px; }
  .lobby-stats .rank-badge { font-size: 9px; padding: 1px 4px; border-left-width: 7px;  }
  .lobby-stats .rank-badge::before { display: none;  }

  /* Players header with autosave + manual save */
  .players-head { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .autosave-label {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 13px; cursor: pointer; user-select: none;
    margin-left: auto;
    background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 4px;
    padding: 7px 12px;
    transition: background-color .12s, border-color .12s, color .12s;
  }
  .autosave-label:hover { border-color: var(--accent); }
  .autosave-label.active {
    background: var(--accent); color: #1a1a1a;
    border-color: var(--accent); font-weight: 600;
  }
  .autosave-label input { accent-color: var(--accent); cursor: pointer; margin: 0; }

  #manualSave { background: var(--accent); color: #1a1a1a; border-color: var(--accent); font-weight: 600; }
  #manualSave:disabled {
    background: var(--panel-2); color: var(--muted);
    border-color: var(--border); cursor: not-allowed; font-weight: 400;
  }
  #manualSave.saved { background: var(--good); border-color: var(--good); color: #fff; }

  /* History sidebar */
  .history-list { display: flex; flex-direction: column; gap: 4px; max-height: 600px; overflow-y: auto; }
  .history-item {
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
    padding: 6px 8px; border-radius: 4px; cursor: pointer;
    background: var(--panel-2); border: 1px solid transparent;
    user-select: none;
  }
  .history-item:hover { border-color: var(--border); }
  .history-item.selected { border-color: var(--accent); background: rgba(245,166,35,0.08); }
  .history-item .h-name { font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
  .history-item .h-remove { background: none; border: none; color: var(--muted); cursor: pointer; padding: 0 4px; font-size: 14px; opacity: 0; }
  .history-item:hover .h-remove { opacity: 1; }
  .history-item .h-remove:hover { color: var(--bad); }
  .history-toolbar { display: grid; gap: 6px; margin-bottom: 10px; align-items: center; }
  .history-toolbar .count { font-size: 12px; color: var(--muted); margin-left: auto; }

  /* Modal */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000; padding: 24px;
  }
  .modal-backdrop[hidden] { display: none; }
  .modal {
    background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
    width: 100%; max-width: 640px; max-height: 90vh;
    display: flex; flex-direction: column;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
  }
  .modal-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px; border-bottom: 1px solid var(--border);
  }
  .modal-title { font-size: 15px; font-weight: 600; }
  .modal-close {
    background: none; border: none; color: var(--muted);
    font-size: 18px; cursor: pointer; padding: 0 6px;
  }
  .modal-close:hover { color: var(--text); }
  .modal-body { padding: 16px; overflow: auto; flex: 1; }
  .modal-foot {
    padding: 12px 16px; border-top: 1px solid var(--border);
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
  }
  .modal-foot .spacer { flex: 1; }
  .modal-msg { font-size: 13px; }
  .modal-msg.ok { color: var(--good); }
  .modal-msg.bad { color: var(--bad); }
  .code-block {
    background: #0e1015; border: 1px solid var(--border); border-radius: 4px;
    padding: 12px; font-family: ui-monospace, Consolas, "SF Mono", Menlo, monospace;
    font-size: 12.5px; color: #cdd3df; line-height: 1.5;
    white-space: pre; overflow: auto; max-height: 60vh;
    margin: 0;
  }
  textarea.code-block {
    width: 100%; min-height: 240px; resize: vertical; color: var(--text);
  }
  textarea.code-block:focus { outline: none; border-color: var(--accent); }
</style>
</head>
<body>

<div class="title-group">
  <h1>CS2 Premier Lobby Manager</h1>
  <div class="sub">Split your group into 5-player lobbies while respecting Premier's rank disparity limit.</div>
</div>

<div class="layout">
  <div></div>

  <div class="panel">
    <h2>History</h2>
    <div class="history-toolbar">
      <div style="display: flex; gap: 8px; flex-wrap: wrap;" class="toolbar-group">
        <button id="copyFromHistory" title="Copy selected players to the Players table">→ Add Selected</button>
        <button id="copyAllFromHistory" title="Copy all history entries to the Players table">→ Add All</button>
      </div>
      <div style="display: flex; gap: 8px; flex-wrap: wrap;" class="toolbar-group">
        <button id="exportHistory" title="Export saved players as JSON">⤒ Export Player List</button>
        <button id="importHistory" title="Import players from JSON">⤓ Import Player List</button>
      </div>
      <span class="count" id="historyCount"></span>
    </div>
    <div class="history-list" id="historyList"></div>
  </div>

  <div class="panel">
    <div class="players-head">
      <h2 style="margin:0;">Players</h2>
      <label class="autosave-label">
        <input type="checkbox" id="autoSave" checked />
        <span>Auto-save</span>
      </label>
      <button id="manualSave">💾 Save</button>
    </div>
    <div class="config-row">
      <label>Max rank disparity:</label>
      <input type="number" id="maxDisparity" value="9500" min="0" step="100" />
      <span style="font-size:12px;">(non-5-stack lobbies only)</span>
    </div>
    <table>
      <thead><tr><th>Name</th><th>Rank</th><th></th></tr></thead>
      <tbody id="playerBody"></tbody>
    </table>
    <div class="toolbar">
      <button id="addRow">+ Add player</button>
      <button id="clearAll" class="danger">Clear all</button>
      <button id="shuffle" style="margin-left:auto;">🔀 Shuffle</button>
      <button id="solve" class="primary">Generate lobbies</button>
    </div>
  </div>

  <div class="panel lobbies-panel">
    <h2>Lobbies</h2>
    <div id="output"><div class="empty">Add players and click "Generate lobbies".</div></div>
  </div>
</div>

<div id="modal" class="modal-backdrop" hidden>
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-head">
      <span class="modal-title" id="modalTitle"></span>
      <button class="modal-close" id="modalClose" aria-label="Close">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-foot" id="modalFoot"></div>
  </div>
</div>

<script>
const STORAGE_KEY = 'cs2-lobbymaker-players-v1';
const HISTORY_KEY = 'cs2-lobbymaker-history-v1';

// Sample roster used by the "Load example" button when history is empty.
// Same shape as the persisted history: lowercased-name -> { name, rank, ts }.

const examplePlayerList = 
{

    "ts": 1780811458374

  },

    "ts": 1780644187141
  },
  "duque": {
    "name": "duque",
    "rank": 13779,
    "ts": 1780644197507
  },
  "numb": {
    "name": "numb",
    "rank": 11004,
    "ts": 1780644204906
  },
  "kiwi": {
    "name": "kiwi",
    "rank": 13232,
    "ts": 1780644230738
  },
  "studzinki": {
    "name": "studzinki",
    "rank": 14113,
    "ts": 1780644256423
  },
  "ferdam": {
    "name": "ferdam",
    "rank": 21582,
    "ts": 1780810050168
  },
  "duzera": {
    "name": "duzera",
    "rank": 15357,
    "ts": 1780644315834
  },
  "diasxd": {
    "name": "diasxd",
    "rank": 16954,
    "ts": 1780644329063
  },
  "medley": {
    "name": "medley",
    "rank": 17050,
    "ts": 1780644370399
  }
};


const tbody = document.getElementById('playerBody');
const output = document.getElementById('output');
const maxDispInput = document.getElementById('maxDisparity');
const historyList = document.getElementById('historyList');
const historyCount = document.getElementById('historyCount');

// ---- Rank tier + badge -----------------------------------------------------
function rankTier(rank) {
  if (rank >= 30000) return 7;
  if (rank >= 25000) return 6;
  if (rank >= 20000) return 5;
  if (rank >= 15000) return 4;
  if (rank >= 10000) return 3;
  if (rank >= 5000)  return 2;
  return 1;
}
function rankBadgeHtml(rank) {
  const t = rankTier(rank);
  return `<span class="rank-badge rank-t${t}"><span>${rank.toLocaleString()}</span></span>`;
}

// ---- History store ---------------------------------------------------------
// Map: lowercased name -> { name (display), rank, ts }. Persisted in localStorage.
let history = {};
let selectedHistory = new Set(); // lowercased names

function loadHistory() {
  try {
    const raw = localStorage.getItem(HISTORY_KEY);
    if (raw) history = JSON.parse(raw) || {};
  } catch (e) { history = {}; }
}
function saveHistory() {
  localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
}
function loadExampleIntoHistory() {
  const now = Date.now();
  // Deep-copy so the constant stays pristine; stamp ts to the current load time.
  for (const [k, v] of Object.entries(examplePlayerList)) {
    history[k] = { name: v.name, rank: v.rank, ts: now };
  }
  saveHistory();
  renderHistory();
}
function updateHistoryFromRows() {
  const players = readPlayers(true);
  let changed = false;
  for (const p of players) {
    const key = p.name.toLowerCase();
    const existing = history[key];
    if (!existing || existing.rank !== p.rank || existing.name !== p.name) {
      history[key] = { name: p.name, rank: p.rank, ts: Date.now() };
      changed = true;
    }
  }
  if (changed) { saveHistory(); renderHistory(); }
}
function renderHistory() {
  const entries = Object.values(history).sort((a, b) => b.rank - a.rank);
  historyCount.textContent = entries.length ? `${entries.length} saved` : '';
  if (!entries.length) {
    historyList.innerHTML = `
      <div class="empty" style="padding:12px;">
        <div style="margin-bottom:10px;">No history yet. Names you enter will appear here.</div>
        <button id="loadExampleBtn">📋 Load example</button>
      </div>`;
    const btn = document.getElementById('loadExampleBtn');
    if (btn) btn.addEventListener('click', loadExampleIntoHistory);
    return;
  }
  historyList.innerHTML = entries.map(e => {
    const key = e.name.toLowerCase();
    const sel = selectedHistory.has(key) ? ' selected' : '';
    return `
      <div class="history-item${sel}" data-key="${escapeHtml(key)}">
        <span class="h-name" title="${escapeHtml(e.name)}">${escapeHtml(e.name)}</span>
        ${rankBadgeHtml(e.rank)}
        <button class="h-remove" title="Remove from history" data-remove="${escapeHtml(key)}">✕</button>
      </div>
    `;
  }).join('');
}
historyList.addEventListener('click', (ev) => {
  const removeBtn = ev.target.closest('[data-remove]');
  if (removeBtn) {
    const key = removeBtn.dataset.remove;
    delete history[key];
    selectedHistory.delete(key);
    saveHistory();
    renderHistory();
    ev.stopPropagation();
    return;
  }
  const item = ev.target.closest('.history-item');
  if (!item) return;
  const key = item.dataset.key;
  if (selectedHistory.has(key)) selectedHistory.delete(key);
  else selectedHistory.add(key);
  renderHistory();
});

function copyHistoryToPlayers(all = false) {
  const sourceKeys = all
    ? Object.keys(history)
    : [...selectedHistory];
  if (!sourceKeys.length) return;
  // Add in rank-desc order so higher-tier players land in the first empty rows.
  const entries = sourceKeys
    .map(k => history[k])
    .filter(Boolean)
    .sort((a, b) => b.rank - a.rank);
  const remaining = [...entries];
  const rows = [...tbody.querySelectorAll('tr')];

  // Pass 1: name collision -> overwrite rank on matching row
  for (const row of rows) {
    const [nameInp, rankInp] = row.querySelectorAll('input');
    const rowName = nameInp.value.trim().toLowerCase();
    if (!rowName) continue;
    const idx = remaining.findIndex(e => e.name.toLowerCase() === rowName);
    if (idx >= 0) {
      const e = remaining[idx];
      nameInp.value = e.name;
      const digits = digitsFromValue(e.rank);
      rankInp.dataset.digits = digits;
      rankInp.value = formatRank(digits);
      remaining.splice(idx, 1);
    }
  }
  // Pass 2: fill empty rows
  for (const row of rows) {
    if (!remaining.length) break;
    const [nameInp, rankInp] = row.querySelectorAll('input');
    const isEmpty = !nameInp.value.trim() && !(rankInp.dataset.digits || '');
    if (isEmpty) {
      const e = remaining.shift();
      nameInp.value = e.name;
      const digits = digitsFromValue(e.rank);
      rankInp.dataset.digits = digits;
      rankInp.value = formatRank(digits);
    }
  }
  // Pass 3: append new rows for leftovers
  for (const e of remaining) tbody.appendChild(makeRow(e.name, e.rank));

  selectedHistory.clear();
  renderHistory();
  savePlayers();
}
document.getElementById('copyFromHistory').addEventListener('click', () => copyHistoryToPlayers(false));
document.getElementById('copyAllFromHistory').addEventListener('click', () => copyHistoryToPlayers(true));

// ---- Modal + export/import ------------------------------------------------
const modal = document.getElementById('modal');
const modalTitle = document.getElementById('modalTitle');
const modalBody = document.getElementById('modalBody');
const modalFoot = document.getElementById('modalFoot');
function openModal(title, bodyHtml, footHtml) {
  modalTitle.textContent = title;
  modalBody.innerHTML = bodyHtml;
  modalFoot.innerHTML = footHtml || '';
  modal.hidden = false;
}
function closeModal() { modal.hidden = true; }
document.getElementById('modalClose').addEventListener('click', closeModal);
modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && !modal.hidden) closeModal(); });

document.getElementById('exportHistory').addEventListener('click', () => {
  const json = JSON.stringify(history, null, 2);
  openModal(
    'Export history',
    `<pre class="code-block" id="exportBlock">${escapeHtml(json)}</pre>`,
    `<span class="modal-msg" id="exportMsg">${Object.keys(history).length} entries</span>
     <div class="spacer"></div>
     <button id="copyJsonBtn" class="primary">📋 Copy to clipboard</button>
     <button id="closeBtn">Close</button>`
  );
  document.getElementById('closeBtn').addEventListener('click', closeModal);
  document.getElementById('copyJsonBtn').addEventListener('click', async () => {
    const btn = document.getElementById('copyJsonBtn');
    try {
      await navigator.clipboard.writeText(json);
      btn.textContent = '✓ Copied';
      setTimeout(() => { btn.textContent = '📋 Copy to clipboard'; }, 1500);
    } catch (e) {
      // Fallback: select the <pre> text so the user can ctrl+C
      const block = document.getElementById('exportBlock');
      const range = document.createRange();
      range.selectNodeContents(block);
      const sel = window.getSelection();
      sel.removeAllRanges(); sel.addRange(range);
      btn.textContent = 'Select all + Ctrl+C';
    }
  });
});

// Validate parsed JSON as a history map. Returns { ok, entries, error }.
function validateHistoryPayload(raw) {
  if (!raw || typeof raw !== 'object' || Array.isArray(raw)) {
    return { ok: false, error: 'Top-level value must be an object mapping name → entry.' };
  }
  const entries = {};
  for (const key of Object.keys(raw)) {
    const v = raw[key];
    if (!v || typeof v !== 'object') return { ok: false, error: `Entry "${key}" is not an object.` };
    const name = typeof v.name === 'string' && v.name.trim() ? v.name.trim() : null;
    const rank = Number(v.rank);
    if (!name) return { ok: false, error: `Entry "${key}" is missing a non-empty "name".` };
    if (!Number.isFinite(rank) || rank < 0) return { ok: false, error: `Entry "${key}" has an invalid "rank".` };
    const ts = Number.isFinite(Number(v.ts)) ? Number(v.ts) : Date.now();
    entries[name.toLowerCase()] = { name, rank, ts };
  }
  return { ok: true, entries };
}

document.getElementById('importHistory').addEventListener('click', () => {
  openModal(
    'Import history',
    `<p style="margin:0 0 10px 0; font-size:13px; color:var(--muted);">Paste a JSON object exported from this app. Existing entries with the same name will be overwritten.</p>
     <textarea class="code-block" id="importInput" spellcheck="false" placeholder='{\n  "alice": { "name": "Alice", "rank": 12345, "ts": 1700000000000 }\n}'></textarea>
     <div class="modal-msg" id="importMsg" style="margin-top:8px; min-height:1.2em;"></div>`,
    `<div class="spacer"></div>
     <button id="importCancelBtn">Cancel</button>
     <button id="importDoBtn" class="primary">Import</button>`
  );
  const input = document.getElementById('importInput');
  const msg = document.getElementById('importMsg');
  input.focus();
  document.getElementById('importCancelBtn').addEventListener('click', closeModal);
  document.getElementById('importDoBtn').addEventListener('click', () => {
    const text = input.value.trim();
    msg.className = 'modal-msg';
    msg.textContent = '';
    if (!text) { msg.className = 'modal-msg bad'; msg.textContent = 'Nothing to import.'; return; }
    let parsed;
    try { parsed = JSON.parse(text); }
    catch (e) { msg.className = 'modal-msg bad'; msg.textContent = 'Invalid JSON: ' + e.message; return; }
    const result = validateHistoryPayload(parsed);
    if (!result.ok) { msg.className = 'modal-msg bad'; msg.textContent = result.error; return; }
    // Merge into existing history (incoming overwrites on key collision).
    let added = 0, updated = 0;
    for (const [k, v] of Object.entries(result.entries)) {
      if (history[k]) updated++; else added++;
      history[k] = v;
    }
    saveHistory();
    renderHistory();
    msg.className = 'modal-msg ok';
    msg.textContent = `Imported ${added + updated} entr${(added+updated)===1?'y':'ies'} (${added} new, ${updated} updated).`;
    setTimeout(closeModal, 900);
  });
});

function loadPlayers() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (Array.isArray(parsed) && parsed.length) return parsed;
    }
  } catch (e) {}
  return Array.from({length: 10}, () => ({name:'', rank:''}));
}

const AUTOSAVE_KEY = 'cs2-lobbymaker-autosave';
function isAutoSave() {
  const el = document.getElementById('autoSave');
  return el ? el.checked : true;
}
function persistPlayers() {
  const players = readPlayers(false);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(players));
  // A persist also commits any rank/name changes to the history sidebar.
  updateHistoryFromRows();
}
function savePlayers() {
  // Both the table state AND history updates are gated by the auto-save toggle.
  // With auto-save off, nothing is written to localStorage until the user hits Save.
  if (isAutoSave()) persistPlayers();
}

// ---- Rank input: pad-with-zeros behavior -----------------------------------
// Internally we store the "typed digits" (1-5 chars). Display:
//   1-4 digits: pad right with zeros to length 4 (e.g. "2" -> "2000", "21" -> "2100")
//   5 digits:   show as-is (e.g. "21539")
// Typing a 6th digit is ignored.
function formatRank(digits) {
  if (!digits) return '';
  if (digits.length >= 5) return digits.slice(0, 5);
  return (digits + '0000').slice(0, 4);
}
// Recover the "typed digits" from a previously-formatted value (for restoring
// from localStorage). 5-digit values are kept as-is; 4-digit values get their
// trailing zeros stripped down to the first significant tail.
function digitsFromValue(val) {
  if (val === '' || val === null || val === undefined) return '';
  let s = String(val).replace(/\D/g, '');
  if (!s) return '';
  if (s.length >= 5) return s.slice(0, 5);
  // length 1-4: strip trailing zeros (but keep at least one digit)
  while (s.length > 1 && s.endsWith('0')) s = s.slice(0, -1);
  return s;
}

function attachRankInput(input, initialDigits = '') {
  input.dataset.digits = initialDigits;
  input.value = formatRank(initialDigits);

  const apply = () => {
    input.value = formatRank(input.dataset.digits);
    // Always put cursor at the end
    const end = input.value.length;
    try { input.setSelectionRange(end, end); } catch (e) {}
  };

  input.addEventListener('beforeinput', (e) => {
    const t = e.inputType || '';
    if (t === 'insertText') {
      e.preventDefault();
      const ch = e.data || '';
      if (/^\d$/.test(ch) && (input.dataset.digits || '').length < 5) {
        input.dataset.digits = (input.dataset.digits || '') + ch;
        apply();
        savePlayers();
      }
    } else if (t.startsWith('delete')) {
      e.preventDefault();
      const d = input.dataset.digits || '';
      if (d.length) {
        input.dataset.digits = d.slice(0, -1);
        apply();
        savePlayers();
      }
    } else if (t === 'insertFromPaste' || t === 'insertReplacementText') {
      e.preventDefault();
      const pasted = (e.data || '').replace(/\D/g, '');
      if (pasted) {
        input.dataset.digits = ((input.dataset.digits || '') + pasted).slice(0, 5);
        apply();
        savePlayers();
      }
    } else {
      // Other input types (e.g. historyUndo): block to keep state consistent
      e.preventDefault();
    }
  });

  // Focus: place cursor at end
  input.addEventListener('focus', () => {
    setTimeout(() => {
      const end = input.value.length;
      try { input.setSelectionRange(end, end); } catch (e) {}
    }, 0);
  });
}

function makeRow(name='', rank='') {
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td><input type="text" class="name-input" placeholder="Player name" value="${escapeHtml(name)}"></td>
    <td><input type="text" inputmode="numeric" class="rank-input" placeholder="—" maxlength="5"></td>
    <td><button class="icon danger" title="Remove">✕</button></td>
  `;
  const [nameInp, rankInp] = tr.querySelectorAll('input');
  attachRankInput(rankInp, digitsFromValue(rank));
  tr.querySelector('button').addEventListener('click', () => { tr.remove(); savePlayers(); });
  nameInp.addEventListener('input', savePlayers);
  return tr;
}

function readPlayers(filtered = true) {
  const rows = [...tbody.querySelectorAll('tr')];
  const players = rows.map(tr => {
    const inputs = tr.querySelectorAll('input');
    const v = inputs[1].value;
    const rank = v === '' ? '' : Number(v);
    return { name: inputs[0].value.trim(), rank };
  });
  if (!filtered) return players;
  return players.filter(p => p.name && p.rank !== '' && !Number.isNaN(p.rank));
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ---- Solver -----------------------------------------------------------------
// Given players + maxDisparity, produce lobbies of size <= 5.
// One lobby may be a "5-stack" (size exactly 5) ignoring disparity.
// All other lobbies must have (maxRank - minRank) <= maxDisparity.
function solve(players, maxDisp) {
  const N = players.length;
  if (N === 0) return { lobbies: [], note: 'No players.' };
  if (N <= 5) {
    return { lobbies: [{ players, fiveStack: N === 5 }], note: null };
  }

  // Sort by rank ascending. Keep original objects.
  const sorted = [...players].sort((a, b) => a.rank - b.rank);

  // Greedy partition of a sorted slice into chunks of <=5 with spread <= maxDisp.
  // Each chunk takes as many consecutive players as fit. Returns null if any single
  // chunk can't even start (shouldn't happen for sane inputs).
  function partitionConstrained(slice) {
    const chunks = [];
    let i = 0;
    while (i < slice.length) {
      let j = i;
      while (j < slice.length && j - i < 5 && slice[j].rank - slice[i].rank <= maxDisp) j++;
      if (j === i) return null;
      chunks.push(slice.slice(i, j));
      i = j;
    }
    return chunks;
  }

  // Score a partition: prefer fewer lobbies, then more balanced sizes,
  // then smaller total spread across constrained lobbies.
  function score(chunks) {
    if (!chunks) return Infinity;
    const sizes = chunks.map(c => c.length);
    const minSize = Math.min(...sizes);
    const totalSpread = chunks.reduce((s, c) => s + (c[c.length-1].rank - c[0].rank), 0);
    // Lower is better. Heavily penalize tiny chunks (size 1 or 2 alone).
    return chunks.length * 1e8 + (5 - minSize) * 1e5 + totalSpread;
  }

  // Strategy: pick 5 players for the "flex" 5-stack. Best candidates are extremes
  // (highest and/or lowest ranks), since they're hardest to fit in constrained lobbies.
  // Try every split: lowest i + highest (5-i) for i in 0..5. The remaining middle
  // (contiguous in sorted order) gets partitioned by spread.
  let best = null;
  for (let i = 0; i <= 5; i++) {
    const lows = sorted.slice(0, i);
    const highs = sorted.slice(N - (5 - i));
    if (lows.length + highs.length !== 5) continue;
    // Overlap check (when N < 10 the slices could overlap)
    if (i > N - (5 - i)) continue;
    const middle = sorted.slice(i, N - (5 - i));
    const chunks = partitionConstrained(middle);
    if (!chunks) continue;
    const fiveStack = [...lows, ...highs];
    const s = score(chunks);
    if (best === null || s < best.score) {
      best = { score: s, fiveStack, chunks };
    }
  }

  // Fallback: if no split works (e.g. middle has a player too far from neighbors),
  // try a brute-ish search picking any 5 for the 5-stack. Cap to keep it snappy.
  if (!best && N <= 15) {
    const indices = [...Array(N).keys()];
    const combos = kCombinations(indices, 5);
    for (const combo of combos) {
      const stackSet = new Set(combo);
      const rest = sorted.filter((_, idx) => !stackSet.has(idx));
      // rest is already sorted (sorted is sorted; filtering preserves order? no, idx refers to sorted index)
      // Build rest by sorted index:
      const restSorted = [];
      for (let k = 0; k < N; k++) if (!stackSet.has(k)) restSorted.push(sorted[k]);
      const chunks = partitionConstrained(restSorted);
      if (!chunks) continue;
      const fiveStack = combo.map(k => sorted[k]);
      const s = score(chunks);
      if (best === null || s < best.score) best = { score: s, fiveStack, chunks };
    }
  }

  if (!best) {
    // Couldn't satisfy. Return greedy partition of everything as constrained,
    // then mark the worst lobby as 5-stack.
    const chunks = partitionConstrained(sorted) || [sorted];
    return {
      lobbies: chunks.map(c => ({ players: c, fiveStack: false })),
      note: 'Could not find a valid grouping with current disparity. Adjust ranks or limit.'
    };
  }

  const lobbies = [
    { players: best.fiveStack, fiveStack: true },
    ...best.chunks.map(c => ({ players: c, fiveStack: false }))
  ];
  return { lobbies, note: null };
}

// Identifies a grouping by the set of player names in the 5-stack (the chunks
// for the other lobbies are fully determined once the 5-stack is chosen, since
// the remaining players, sorted by rank, must be packed contiguously).
function signatureOf(result) {
  if (!result || !result.lobbies) return null;
  const stack = result.lobbies.find(l => l.fiveStack);
  if (!stack) return null;
  return stack.players.map(p => p.name).slice().sort().join('|');
}

// Find a random valid grouping (different from `avoidSignature` when possible).
// "Valid" = one 5-stack (any 5 players) + remaining players partitioned, in
// sorted-by-rank order, into chunks of <=5 each with spread <= maxDisp.
function solveShuffle(players, maxDisp, avoidSignature) {
  const N = players.length;
  if (N <= 5) return solve(players, maxDisp);
  const sorted = [...players].sort((a, b) => a.rank - b.rank);

  function partitionConstrained(slice) {
    const chunks = [];
    let i = 0;
    while (i < slice.length) {
      let j = i;
      while (j < slice.length && j - i < 5 && slice[j].rank - slice[i].rank <= maxDisp) j++;
      if (j === i) return null;
      chunks.push(slice.slice(i, j));
      i = j;
    }
    return chunks;
  }

  // Enumerate (or sample) 5-player combos and collect valid solutions.
  const valid = [];
  const indices = [...Array(N).keys()];
  let combos;
  if (N <= 16) {
    combos = kCombinations(indices, 5);
  } else {
    // Sample ~800 random 5-subsets, deduped.
    const seen = new Set();
    combos = [];
    for (let t = 0; t < 2000 && combos.length < 800; t++) {
      const pick = [];
      const pool = indices.slice();
      for (let k = 0; k < 5; k++) pool.splice(Math.floor(Math.random() * pool.length), 1).forEach(x => pick.push(x));
      pick.sort((a,b)=>a-b);
      const key = pick.join(',');
      if (!seen.has(key)) { seen.add(key); combos.push(pick); }
    }
  }

  for (const combo of combos) {
    const stackSet = new Set(combo);
    const rest = [];
    for (let k = 0; k < N; k++) if (!stackSet.has(k)) rest.push(sorted[k]);
    const chunks = partitionConstrained(rest);
    if (chunks) valid.push({ fiveStack: combo.map(k => sorted[k]), chunks });
  }

  if (!valid.length) {
    // No valid shuffle — fall back to deterministic solver (which may warn).
    return solve(players, maxDisp);
  }

  // Prioritize full 5-player lobbies: the 5-stack is always 5, so count how
  // many of the remaining chunks are also size 5 and keep only the solutions
  // tied for the maximum.
  const fullFives = v => 1 + v.chunks.filter(c => c.length === 5).length;
  const maxFulls = valid.reduce((m, v) => Math.max(m, fullFives(v)), 0);
  const prioritized = valid.filter(v => fullFives(v) === maxFulls);

  // Prefer signatures different from the previous one (within the prioritized set).
  const sigOf = v => v.fiveStack.map(p => p.name).slice().sort().join('|');
  const pool = avoidSignature ? prioritized.filter(v => sigOf(v) !== avoidSignature) : prioritized;
  const finalPool = pool.length ? pool : prioritized;
  const pick = finalPool[Math.floor(Math.random() * finalPool.length)];

  // Shuffle the visual order of the constrained lobbies too, for variety.
  const constrained = pick.chunks.map(c => ({ players: c, fiveStack: false }));
  for (let i = constrained.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [constrained[i], constrained[j]] = [constrained[j], constrained[i]];
  }

  return {
    lobbies: [{ players: pick.fiveStack, fiveStack: true }, ...constrained],
    note: null
  };
}

function kCombinations(arr, k) {
  const out = [];
  const n = arr.length;
  const idx = Array.from({length: k}, (_, i) => i);
  if (k > n) return out;
  while (true) {
    out.push(idx.map(i => arr[i]));
    let i = k - 1;
    while (i >= 0 && idx[i] === n - k + i) i--;
    if (i < 0) break;
    idx[i]++;
    for (let j = i + 1; j < k; j++) idx[j] = idx[j-1] + 1;
  }
  return out;
}

// ---- Rendering --------------------------------------------------------------
function render(result, maxDisp) {
  output.innerHTML = '';
  if (result.note) {
    const w = document.createElement('div');
    w.className = 'warn-msg';
    w.textContent = result.note;
    output.appendChild(w);
  }
  if (!result.lobbies.length) {
    output.innerHTML += '<div class="empty">No players to place.</div>';
    return;
  }
  result.lobbies.forEach((lobby, idx) => {
    const ranks = lobby.players.map(p => p.rank);
    const spread = ranks.length ? Math.max(...ranks) - Math.min(...ranks) : 0;
    const avg = ranks.length ? Math.round(ranks.reduce((a,b)=>a+b,0) / ranks.length) : 0;
    const overLimit = !lobby.fiveStack && spread > maxDisp;
    const cls = lobby.fiveStack ? 'stack5' : (overLimit ? 'bad' : 'ok');
    const badgeText = lobby.fiveStack
      ? '5-STACK · no rank limit'
      : (overLimit ? `OVER LIMIT (${spread})` : `spread ${spread}`);
    const badgeCls = lobby.fiveStack ? 'stack5' : (overLimit ? 'bad' : 'ok');

    const div = document.createElement('div');
    div.className = 'lobby ' + cls;
    div.innerHTML = `
      <div class="lobby-head">
        <div class="lobby-title">Lobby ${idx + 1} <span style="color:var(--muted);font-weight:400;">· ${lobby.players.length} player${lobby.players.length===1?'':'s'}</span></div>
        <span class="badge ${badgeCls}">${badgeText}</span>
      </div>
      ${lobby.players.map(p => `
        <div class="player-row">
          <span>${escapeHtml(p.name)}</span>
          ${rankBadgeHtml(p.rank)}
        </div>
      `).join('')}
      <div class="lobby-stats">avg ${rankBadgeHtml(avg)} · spread ${spread.toLocaleString()}</div>
    `;
    output.appendChild(div);
  });
}

// ---- Wire up ----------------------------------------------------------------
document.getElementById('addRow').addEventListener('click', () => {
  tbody.appendChild(makeRow());
  savePlayers();
});
document.getElementById('clearAll').addEventListener('click', () => {
  if (!confirm('Remove all players?')) return;
  tbody.innerHTML = '';
  for (let i = 0; i < 10; i++) tbody.appendChild(makeRow());
  savePlayers();
  output.innerHTML = '<div class="empty">Add players and click "Generate lobbies".</div>';
  lastSignature = null;
});

let lastSignature = null;

document.getElementById('solve').addEventListener('click', () => {
  const players = readPlayers(true);
  const maxDisp = Math.max(0, Number(maxDispInput.value) || 0);
  const result = solve(players, maxDisp);
  lastSignature = signatureOf(result);
  render(result, maxDisp);
});

document.getElementById('shuffle').addEventListener('click', () => {
  const players = readPlayers(true);
  const maxDisp = Math.max(0, Number(maxDispInput.value) || 0);
  const result = solveShuffle(players, maxDisp, lastSignature);
  lastSignature = signatureOf(result);
  render(result, maxDisp);
});
maxDispInput.addEventListener('change', () => localStorage.setItem('cs2-lobbymaker-disp', maxDispInput.value));

// Init
loadHistory();
renderHistory();
const savedDisp = localStorage.getItem('cs2-lobbymaker-disp');
if (savedDisp) maxDispInput.value = savedDisp;

// Auto-save toggle
const autoSaveEl = document.getElementById('autoSave');
const manualSaveBtn = document.getElementById('manualSave');
const storedAuto = localStorage.getItem(AUTOSAVE_KEY);
if (storedAuto !== null) autoSaveEl.checked = storedAuto === '1';
const autoSaveLabel = autoSaveEl.closest('.autosave-label');
function syncAutoSaveUi() {
  // Manual Save button stays visible; its enabled state mirrors the toggle
  // (disabled when auto-save is on, because edits are persisted automatically).
  manualSaveBtn.disabled = autoSaveEl.checked;
  manualSaveBtn.classList.remove('saved');
  manualSaveBtn.textContent = '💾 Save';
  autoSaveLabel.classList.toggle('active', autoSaveEl.checked);
}
autoSaveEl.addEventListener('change', () => {
  localStorage.setItem(AUTOSAVE_KEY, autoSaveEl.checked ? '1' : '0');
  syncAutoSaveUi();
  // Flipping on auto-save commits the current state immediately.
  if (autoSaveEl.checked) persistPlayers();
});
manualSaveBtn.addEventListener('click', () => {
  persistPlayers();
  manualSaveBtn.classList.add('saved');
  manualSaveBtn.textContent = '✓ Saved';
  setTimeout(syncAutoSaveUi, 1200);
});
syncAutoSaveUi();

const initial = loadPlayers();
(initial.length ? initial : [{name:'',rank:''}]).forEach(p => tbody.appendChild(makeRow(p.name, p.rank)));

</script>
